name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Package (build + DMG)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Packaging version $VERSION"
          ./scripts/package.sh "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.dmg \
            --title "ClaudeMonitor $GITHUB_REF_NAME" \
            --notes "멀티 계정 Claude 사용량 모니터 (macOS 메뉴바). DMG 를 열어 ClaudeMonitor.app 을 Applications 로 드래그하세요. ad-hoc 서명이라 첫 실행은 우클릭 → 열기. 설정에서 English / 한국어 전환 가능."
