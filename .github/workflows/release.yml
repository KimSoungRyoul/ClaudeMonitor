name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Package (build + DMG)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Packaging version $VERSION"
          ./scripts/package.sh "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.dmg \
            --title "ClaudeMonitor $GITHUB_REF_NAME" \
            --notes "Multi-account Claude usage monitor for the macOS menu bar. Open the DMG and drag ClaudeMonitor.app into Applications. It is ad-hoc signed, so on first launch use right-click -> Open. Language (English / Korean) is selectable in Settings."
